version: "3.9"

services:
  load_balancer:
    build: ./load_balancer
    image: my-lb-image
    container_name: main_load_balancer
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    networks:
      - net1

networks:
  net1:
    name: net1
